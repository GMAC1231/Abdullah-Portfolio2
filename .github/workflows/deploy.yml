name: Deploy Next.js Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Next.js Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Check required project files
        run: |
          test -f package.json
          test -f package-lock.json
          test -f next.config.ts
          node --version
          npm --version

      - name: Install dependencies
        timeout-minutes: 10
        run: npm ci --no-audit --no-fund --progress=false

      - name: Verify Next.js installation
        run: npx --no-install next --version

      - name: Build Next.js portfolio
        timeout-minutes: 12
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Verify static export
        run: |
          test -f out/index.html
          touch out/.nojekyll
          echo "Static export generated successfully."
          du -sh out

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy portfolio
        id: deployment
        uses: actions/deploy-pages@v4
