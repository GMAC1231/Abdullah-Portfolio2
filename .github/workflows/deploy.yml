name: Deploy Next.js Portfolio

on:
  push:
    branches:
      - main

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build Next.js Portfolio
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Show project files
        run: |
          pwd
          ls -la
          node --version
          npm --version

      - name: Install dependencies
        run: npm ci

      - name: Verify Next.js installation
        run: |
          if [ ! -x "node_modules/.bin/next" ]; then
            echo "ERROR: Next.js was not installed."
            exit 1
          fi

          npx --no-install next --version

      - name: Build Next.js portfolio
        run: npm run build
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}

      - name: Verify static export
        run: |
          if [ ! -f "out/index.html" ]; then
            echo "ERROR: out/index.html was not generated."
            exit 1
          fi

          touch out/.nojekyll
          echo "Static export generated successfully."
          find out -maxdepth 2 -type f | head -40

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy portfolio
        id: deployment
        uses: actions/deploy-pages@v4