name: Deploy Next.js Portfolio

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    name: Build Next.js Portfolio
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Show project information
        run: |
          echo "Working directory:"
          pwd

          echo "Project files:"
          ls -la

          echo "Node version:"
          node --version

          echo "npm version:"
          npm --version

          echo "Repository:"
          echo "${{ github.repository }}"

      - name: Check required files
        run: |
          if [ ! -f "package.json" ]; then
            echo "ERROR: package.json was not found."
            exit 1
          fi

          if [ ! -f "package-lock.json" ]; then
            echo "ERROR: package-lock.json was not found."
            exit 1
          fi

          if [ ! -f "next.config.ts" ]; then
            echo "ERROR: next.config.ts was not found."
            exit 1
          fi

      - name: Configure npm
        timeout-minutes: 2
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set fetch-retries 3
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 60000
          npm ping

      - name: Install dependencies
        timeout-minutes: 10
        run: |
          npm ci \
            --no-audit \
            --no-fund \
            --prefer-online \
            --progress=false \
            --loglevel=verbose

      - name: Verify Next.js installation
        run: |
          if [ ! -f "node_modules/.bin/next" ]; then
            echo "ERROR: Next.js was not installed."
            exit 1
          fi

          npx --no-install next --version

      - name: Build Next.js portfolio
        timeout-minutes: 10
        env:
          GITHUB_ACTIONS: "true"
          GITHUB_PAGES: "true"
          GITHUB_REPOSITORY: ${{ github.repository }}
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build

      - name: Verify static export
        run: |
          if [ ! -d "out" ]; then
            echo "ERROR: The out directory was not generated."
            exit 1
          fi

          if [ ! -f "out/index.html" ]; then
            echo "ERROR: out/index.html was not generated."
            exit 1
          fi

          touch out/.nojekyll

          echo "Static export generated successfully."
          du -sh out
          find out -maxdepth 2 -type f | head -40

      - name: Upload GitHub Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./out

  deploy:
    name: Deploy GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy portfolio
        id: deployment
        uses: actions/deploy-pages@v4